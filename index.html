<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <!-- skoop-live-prescript -->
  <!-- skoop-live-runtime -->
  <script src="./skoop-live.js"></script>
  <script>
  // Skoop live-preview fetch shim — only active when dirty data is injected
  (function () {
    if (typeof window === 'undefined' || !window.__skoop_dirty_data__) return;
    var dirty = window.__skoop_dirty_data__;
    var origFetch = window.fetch ? window.fetch.bind(window) : null;
    window.fetch = function (input, init) {
      try {
        var url = typeof input === 'string' ? input : (input && input.url) || '';
        // Match bare 'data.json', './data.json', or any URL ending /data.json (with or without query)
        if (/(^|\/)data\.json(\?.*)?$/.test(url) || url === 'data.json') {
          var body = JSON.stringify(dirty);
          return Promise.resolve(new Response(body, {
            status: 200,
            headers: { 'Content-Type': 'application/json' }
          }));
        }
      } catch (e) {}
      return origFetch ? origFetch(input, init) : Promise.reject(new Error('fetch unavailable'));
    };
  })();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <style>
        :root {
            /* Light Theme */
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --card-bg: #ffffff;
            --card-hover: #f9fafb;
            --border-color: #e5e7eb;
            --primary: #00b7af;
            --primary-hover: #009c95;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --warning: #f59e0b;
            --priority-low: #3b82f6;
            --priority-medium: #f59e0b;
            --priority-high: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --transition: all 0.2s ease-in-out;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-color: #10181f;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --card-bg: #1f2937;
            --card-hover: #374151;
            --border-color: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-main);
            transition: transform 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* Analytics */
        .analytics {
            background-color: var(--card-bg);
            padding: 1rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .analytics-item strong {
            color: var(--text-main);
            font-size: 1.1rem;
            margin-left: 0.5rem;
        }

        /* Input Form */
        .task-form {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 1rem;
            align-items: start;
        }

        @media (max-width: 600px) {
            .task-form {
                grid-template-columns: 1fr;
            }
        }

        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            transition: var(--transition);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 183, 175, 0.2);
        }

        .form-row {
            display: flex;
            gap: 1rem;
            width: 100%;
            grid-column: 1 / -1;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            white-space: nowrap;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        /* Controls: Search & Filters */
        .controls-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            padding: 1rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }

        .filters {
            display: flex;
            gap: 0.5rem;
        }

        .filter-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            padding: 0.5rem 1rem;
        }

        .filter-btn.active {
            background-color: var(--bg-color);
            color: var(--primary);
            border-color: var(--border-color);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        /* Task List */
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            min-height: 200px;
        }

        .task-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            cursor: grab;
            animation: slideIn 0.3s ease-out;
            border-left: 4px solid transparent;
        }

        .task-card:active {
            cursor: grabbing;
        }

        .task-card.dragging {
            opacity: 0.5;
            background-color: var(--bg-color);
            border: 2px dashed var(--primary);
        }

        .task-card:hover {
            box-shadow: var(--shadow-md);
        }

        /* Priorities */
        .task-card[data-priority="low"] { border-left-color: var(--priority-low); }
        .task-card[data-priority="medium"] { border-left-color: var(--priority-medium); }
        .task-card[data-priority="high"] { border-left-color: var(--priority-high); }

        .checkbox {
            width: 1.5rem;
            height: 1.5rem;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .task-content {
            flex: 1;
            min-width: 0; /* for word wrap */
        }

        .task-title {
            font-size: 1.1rem;
            font-weight: 500;
            word-break: break-word;
            transition: var(--transition);
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .badge {
            padding: 0.1rem 0.5rem;
            border-radius: 999px;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .badge-overdue {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            background: none;
            padding: 0.5rem;
            color: var(--text-muted);
            border-radius: var(--radius-md);
        }

        .btn-icon:hover {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .btn-delete:hover {
            color: var(--danger);
            background-color: rgba(239, 68, 68, 0.1);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 2px dashed var(--border-color);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }

        .removing {
            animation: fadeOut 0.3s forwards;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <h1>✓ Smart Task Manager</h1>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">🌙</button>
            </div>
        </header>

        <!-- Analytics -->
        <div class="analytics">
            <div class="analytics-item">Total Tasks: <strong id="stat-total">0</strong></div>
            <div class="analytics-item">Completed: <strong id="stat-completed">0</strong></div>
            <div class="analytics-item">Completed Today: <strong id="stat-today">0</strong></div>
        </div>

        <!-- Task Form -->
        <form class="task-form" id="taskForm">
            <input type="text" id="taskInput" placeholder="What needs to be done?" required autocomplete="off">
            <div class="form-row">
                <select id="priorityInput">
                    <option value="low">Low Priority</option>
                    <option value="medium" selected>Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
                <input type="date" id="dateInput" title="Due Date">
            </div>
            <button type="submit" class="btn-primary" style="grid-column: 1 / -1; margin-top: 0.5rem;">Add Task (Enter)</button>
        </form>

        <!-- Controls (Filters & Search) -->
        <div class="controls-container">
            <div class="filters" id="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search tasks...">
            </div>
        </div>

        <!-- Task List -->
        <ul class="task-list" id="taskList">
            <!-- Tasks injected via JS -->
        </ul>
    </div>

    <script>
        /**
         * Smart Task Manager - Core Logic
         * Modular, Vanilla JS implementation
         */

        const App = {
            tasks: [],
            currentFilter: 'all',
            searchQuery: '',
            draggedTaskIndex: null,

            // DOM Elements
            els: {
                form: document.getElementById('taskForm'),
                input: document.getElementById('taskInput'),
                priority: document.getElementById('priorityInput'),
                date: document.getElementById('dateInput'),
                list: document.getElementById('taskList'),
                filters: document.getElementById('filters'),
                search: document.getElementById('searchInput'),
                themeToggle: document.getElementById('themeToggle'),
                statTotal: document.getElementById('stat-total'),
                statCompleted: document.getElementById('stat-completed'),
                statToday: document.getElementById('stat-today'),
                html: document.documentElement
            },

            init() {
                this.loadData();
                this.bindEvents();
                this.initTheme();
                this.render();
            },

            // --- Data Persistence ---
            loadData() {
                const stored = localStorage.getItem('smart_tasks');
                if (stored) {
                    try {
                        this.tasks = JSON.parse(stored);
                    } catch (e) {
                        console.error('Failed to parse tasks', e);
                        this.tasks = [];
                    }
                }
            },

            saveData() {
                localStorage.setItem('smart_tasks', JSON.stringify(this.tasks));
                this.updateStats();
            },

            // --- Core Features ---
            addTask(e) {
                e.preventDefault();
                const text = this.els.input.value.trim();

                if (!text) return alert('Task cannot be empty.');
                if (text.length > 250) return alert('Task text is too long.');

                // Duplicate check
                const isDuplicate = this.tasks.some(t => t.text.toLowerCase() === text.toLowerCase());
                if (isDuplicate) {
                    return alert('This task already exists!');
                }

                const newTask = {
                    id: Date.now().toString(),
                    text: text,
                    priority: this.els.priority.value,
                    dueDate: this.els.date.value,
                    completed: false,
                    createdAt: new Date().toISOString(),
                    completedAt: null
                };

                // Add to beginning of array
                this.tasks.unshift(newTask);
                this.saveData();

                // Reset form
                this.els.input.value = '';
                this.els.date.value = '';
                this.els.priority.value = 'medium';
                this.els.input.focus();

                this.render();
            },

            deleteTask(id, element) {
                if(!confirm('Are you sure you want to delete this task?')) return;

                // Animate out
                element.classList.add('removing');
                element.addEventListener('animationend', () => {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                    this.saveData();
                    this.render();
                });
            },

            toggleTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    task.completedAt = task.completed ? new Date().toISOString() : null;
                    this.saveData();
                    this.render();
                }
            },

            editTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (!task) return;

                const newText = prompt('Edit task:', task.text);
                if (newText !== null) {
                    const trimmed = newText.trim();
                    if (trimmed && trimmed.length <= 250) {
                        // Check duplicate
                        if (this.tasks.some(t => t.id !== id && t.text.toLowerCase() === trimmed.toLowerCase())) {
                            return alert('This task already exists!');
                        }
                        task.text = trimmed;
                        this.saveData();
                        this.render();
                    } else if (trimmed.length > 250) {
                        alert('Task text is too long.');
                    }
                }
            },

            // --- Stats & UI ---
            updateStats() {
                const total = this.tasks.length;
                const completed = this.tasks.filter(t => t.completed).length;

                // Completed today
                const todayStr = new Date().toDateString();
                const todayCompleted = this.tasks.filter(t => {
                    return t.completed && t.completedAt && new Date(t.completedAt).toDateString() === todayStr;
                }).length;

                this.els.statTotal.textContent = total;
                this.els.statCompleted.textContent = completed;
                this.els.statToday.textContent = todayCompleted;
            },

            // --- Drag and Drop ---
            handleDragStart(e, index) {
                this.draggedTaskIndex = index;
                e.target.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
                // Need to set data for Firefox
                e.dataTransfer.setData('text/plain', index);
            },

            handleDragOver(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                const list = this.els.list;
                const afterElement = this.getDragAfterElement(list, e.clientY);
                const dragging = document.querySelector('.dragging');
                if (afterElement == null) {
                    list.appendChild(dragging);
                } else {
                    list.insertBefore(dragging, afterElement);
                }
            },

            handleDrop(e) {
                e.preventDefault();
                const dragging = document.querySelector('.dragging');
                if(!dragging) return;

                dragging.classList.remove('dragging');

                // Recalculate array based on new DOM order
                const items = [...this.els.list.querySelectorAll('.task-card')];
                const newTasksOrder = [];

                // Map current display items to active dataset, maintaining order
                items.forEach(item => {
                    const id = item.dataset.id;
                    const task = this.tasks.find(t => t.id === id);
                    if(task) newTasksOrder.push(task);
                });

                // Merge back hidden tasks (filtered out ones) if any
                const visibleIds = new Set(newTasksOrder.map(t => t.id));
                const hiddenTasks = this.tasks.filter(t => !visibleIds.has(t.id));

                // Append hidden tasks at the end to not lose them
                this.tasks = [...newTasksOrder, ...hiddenTasks];
                this.saveData();
                // Avoid re-render here to keep smooth D&D, state is already updated visually
            },

            getDragAfterElement(container, y) {
                const draggableElements = [...container.querySelectorAll('.task-card:not(.dragging)')];

                return draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = y - box.top - box.height / 2;
                    if (offset < 0 && offset > closest.offset) {
                        return { offset: offset, element: child };
                    } else {
                        return closest;
                    }
                }, { offset: Number.NEGATIVE_INFINITY }).element;
            },

            // --- Theme ---
            initTheme() {
                const savedTheme = localStorage.getItem('smart_theme');
                const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = savedTheme || (prefersDark ? 'dark' : 'light');
                this.setTheme(theme);
            },

            setTheme(theme) {
                this.els.html.setAttribute('data-theme', theme);
                localStorage.setItem('smart_theme', theme);
                this.els.themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            },

            toggleTheme() {
                const current = this.els.html.getAttribute('data-theme');
                this.setTheme(current === 'dark' ? 'light' : 'dark');
            },

            // --- Rendering ---
            getFilteredTasks() {
                return this.tasks.filter(task => {
                    // Search
                    if (this.searchQuery && !task.text.toLowerCase().includes(this.searchQuery.toLowerCase())) {
                        return false;
                    }
                    // Filter
                    if (this.currentFilter === 'pending') return !task.completed;
                    if (this.currentFilter === 'completed') return task.completed;
                    return true;
                });
            },

            isTaskOverdue(dateStr, completed) {
                if (!dateStr || completed) return false;
                const due = new Date(dateStr);
                due.setHours(23, 59, 59, 999);
                return due < new Date();
            },

            formatDate(dateStr) {
                if (!dateStr) return '';
                const d = new Date(dateStr);
                return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
            },

            render() {
                const list = this.els.list;
                list.innerHTML = '';

                const filtered = this.getFilteredTasks();

                if (filtered.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                            </svg>
                            <h2>No tasks found</h2>
                            <p>You're all caught up! Take a break or add a new task.</p>
                        </div>
                    `;
                    this.updateStats();
                    return;
                }

                filtered.forEach((task, index) => {
                    const li = document.createElement('li');
                    li.className = `task-card ${task.completed ? 'completed' : ''}`;
                    li.dataset.id = task.id;
                    li.dataset.priority = task.priority;
                    li.draggable = true;

                    const overdue = this.isTaskOverdue(task.dueDate, task.completed);

                    li.innerHTML = `
                        <input type="checkbox" class="checkbox" ${task.completed ? 'checked' : ''} aria-label="Mark task complete">
                        <div class="task-content">
                            <div class="task-title">${this.escapeHTML(task.text)}</div>
                            <div class="task-meta">
                                <span>Priority: ${task.priority.charAt(0).toUpperCase() + task.priority.slice(1)}</span>
                                ${task.dueDate ? `<span class="${overdue ? 'badge badge-overdue' : ''}">${overdue ? '⚠️ Overdue: ' : 'Due: '}${this.formatDate(task.dueDate)}</span>` : ''}
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="btn-icon btn-edit" title="Edit task" aria-label="Edit">✏️</button>
                            <button class="btn-icon btn-delete" title="Delete task" aria-label="Delete">🗑️</button>
                        </div>
                    `;

                    // Bind Item Events
                    li.querySelector('.checkbox').addEventListener('change', () => this.toggleTask(task.id));
                    li.querySelector('.btn-edit').addEventListener('click', () => this.editTask(task.id));
                    li.querySelector('.btn-delete').addEventListener('click', (e) => this.deleteTask(task.id, li));

                    // Bind Drag Events
                    li.addEventListener('dragstart', (e) => this.handleDragStart(e, index));
                    li.addEventListener('dragend', () => li.classList.remove('dragging'));

                    list.appendChild(li);
                });

                this.updateStats();
            },

            // --- Utility ---
            escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            },

            bindEvents() {
                // Form submit
                this.els.form.addEventListener('submit', (e) => this.addTask(e));

                // Keyboard shortcut (Enter to add - implicitly handled by form submit, but let's ensure focus)
                document.addEventListener('keydown', (e) => {
                    // Global shortcut to focus input if pressing '/'
                    if (e.key === '/' && document.activeElement !== this.els.input && document.activeElement !== this.els.search) {
                        e.preventDefault();
                        this.els.search.focus();
                    }
                });

                // Filters
                this.els.filters.addEventListener('click', (e) => {
                    if (e.target.classList.contains('filter-btn')) {
                        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentFilter = e.target.dataset.filter;
                        this.render();
                    }
                });

                // Search
                this.els.search.addEventListener('input', (e) => {
                    this.searchQuery = e.target.value;
                    this.render();
                });

                // Theme
                this.els.themeToggle.addEventListener('click', () => this.toggleTheme());

                // Drag and Drop Container
                this.els.list.addEventListener('dragover', (e) => this.handleDragOver(e));
                this.els.list.addEventListener('drop', (e) => this.handleDrop(e));
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => App.init());

    </script>
</body>
</html>
